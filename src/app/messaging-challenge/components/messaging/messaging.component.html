<div class="container">
  <div class="fake-phone">
    <div *ngFor="let message of messages$ | async">
      <!-- Check if it's a TextMessage and display accordingly -->
      <app-text-message *ngIf="isTextMessage(message)" [message]="message">
      </app-text-message>

      <!-- Fallback for debugging -->
      <pre *ngIf="!isTextMessage(message)">{{ message | json }}</pre>
    </div>
  </div>
</div>
